name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium (Playwright)
        run: npx playwright install --with-deps chromium

      # ubuntu-latest ships a running Docker daemon, so the real-sandbox tests
      # execute (they skip only when no daemon is present). They boot the project
      # in a node:20-alpine container, so the image must be pulled first —
      # otherwise startSandbox fails with "Image Docker introuvable".
      - name: Pull sandbox image (node:20-alpine)
        run: docker pull node:20-alpine

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
