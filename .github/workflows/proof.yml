# ProofCast proving ProofCast — this repo's own proof gate on every pull request.
#
# It runs the action FROM THE BRANCH UNDER REVIEW (`uses: ./`), so a PR that breaks
# the action turns its own check red. That is the point of the product, applied to
# the product.
#
# Because the action is self-contained (it runs the ProofCast bundled at its own
# ref), this is byte-for-byte what an outside repo does — only the `uses:` line
# differs. Copy `examples/github-action/proof.yml` instead of this file.

name: Proof

on:
  pull_request:
  push:
    branches: [main]

# `GITHUB_TOKEN` is enough — ProofCast needs no secret to record a proof.
permissions:
  contents: read
  pull-requests: write # post the proof comment
  statuses: write # publish the proofcast/proof check

# Two quick pushes would otherwise race, and the slower run could overwrite the
# newer proof comment with a stale one. Keep only the latest per branch.
concurrency:
  group: proof-${{ github.ref }}
  cancel-in-progress: true

jobs:
  proof:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./
        with:
          path: examples/checkout
