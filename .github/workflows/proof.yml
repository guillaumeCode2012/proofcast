# ProofCast proving ProofCast — this repo's own proof gate on every pull request.
#
# It runs the action FROM THE BRANCH UNDER REVIEW (`uses: ./`, and `version:` set to
# this checkout), so a PR that breaks the action turns its own check red. That is the
# point of the product, applied to the product.
#
# ⚠️ This is NOT the file to copy. If you want proof on your own PRs, copy
# `examples/github-action/proof.yml` — it is the same workflow with the two lines
# below swapped for `uses: guillaumeCode2012/proofcast@v1`.

name: Proof

on:
  pull_request:
  push:
    branches: [main]

# `GITHUB_TOKEN` is enough — ProofCast needs no secret to record a proof.
permissions:
  contents: read
  pull-requests: write # post the proof comment
  statuses: write # publish the proofcast/proof check

jobs:
  proof:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Dogfooding only. Installing ProofCast from this checkout re-runs `prepare`
      # (tsc) in the workspace, which needs the devDependencies to be present —
      # consumers install from npm, which ships a prebuilt dist/ and skips `prepare`.
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - uses: ./
        with:
          path: examples/checkout
          # Install ProofCast from THIS checkout instead of npm, so the proof is
          # produced by the code in the PR rather than by the last release.
          version: ${{ github.workspace }}
